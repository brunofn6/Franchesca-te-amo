<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te amo Franchesca</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<section class="hero">
<h1>❤️ Te amo Franchesca ❤️</h1>
</section>

<section class="contador">
<h2>⏳ Desde que hablamos...</h2>
<p id="tiempo"></p>
</section>

<section class="razones">
<h2>25 razones 💖</h2>
<ul>
<li>Tu sonrisa 😍</li>
<li>Tu mirada 💕</li>
<li>Cómo me hacés sentir 💘</li>
<li>Tu risa 😂</li>
<li>Tu ternura 🥺</li>
</ul>
</section>

<section class="sorpresa">
<h2>🎯 Reto</h2>
<p>¿Qué día empezamos a hablar? 💘</p>

<input type="text" id="fecha" placeholder="dd/mm">
<button onclick="verificar()">Intentar</button>

<p id="resultado"></p>

<!-- 💌 CARTA -->
<div id="cartaFinal" class="oculto">
  <div class="slider">
    <img src="foto1.jpg" class="slide activo">
    <img src="foto2.jpg" class="slide">
    <img src="foto3.jpg" class="slide">
    <img src="foto4.jpg" class="slide">
    <img src="foto5.jpg" class="slide">
  </div>

  <div class="texto-carta">
    <p>
      Acá escribís tu carta 💖<br><br>
      Te amo muchísimo y quiero todo con vos...
    </p>
  </div>
</div>

<!-- 💖 PROPUESTA -->
<div id="propuesta" class="oculto">
<h2>💖 ¿Querés ser mi novia? 💖</h2>
<button onclick="aceptar()">SÍ 💘</button>
<button id="noBtn">NO 😜</button>
</div>

</section>

<script>
// CONTADOR
const inicio = new Date("2026-04-06T01:56:00");
setInterval(()=>{
let ahora=new Date();
let diff=ahora-inicio;
let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
document.getElementById("tiempo").innerText=
`${d} días, ${h} horas, ${m} minutos 💕`;
},1000);

// RETO
function verificar(){
let f=document.getElementById("fecha").value.trim();

if(f==="06/04" || f==="6/4"){
document.getElementById("resultado").innerText="💖 Correcto 💖";

let carta = document.getElementById("cartaFinal");
carta.classList.remove("oculto");

setTimeout(()=>carta.classList.add("mostrar"),10);

iniciarSlider();

}else{
document.getElementById("resultado").innerText="😜 Intentá de nuevo";
}
}

// SLIDER
function iniciarSlider(){
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  let intervalo = setInterval(()=>{
    slides[i].classList.remove("activo");
    i++;

    if(i >= slides.length){
      clearInterval(intervalo);

      let p = document.getElementById("propuesta");
      p.classList.remove("oculto");
      p.style.display = "flex";

      return;
    }

    slides[i].classList.add("activo");
  }, 2000);
}

// BOTON NO ESCAPA
window.addEventListener("DOMContentLoaded", () => {
  let noBtn=document.getElementById("noBtn");

  noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*80+"%";
    noBtn.style.top=Math.random()*80+"%";
  });
});

// ACEPTAR
function aceptar(){
document.getElementById("propuesta").innerHTML =
"<h1 style='font-size:70px'>💖 YA SOS MI NOVIA 💖</h1>";
}
</script>

</body>
</html>
