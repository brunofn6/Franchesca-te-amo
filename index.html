<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te amo Franchesca</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 💖 INTRO -->
<div id="intro">

  <div class="fondo-intro" id="fondoIntro"></div>

  <div class="frases">
    <span style="top:10%;left:5%;">no sabes lo que vales para mi</span>
    <span style="top:30%;left:60%;">sos todo</span>
    <span style="top:70%;left:20%;">me haces feliz</span>
    <span style="top:50%;left:40%;">no te cambio por nada</span>
  </div>

  <div class="intro-contenido">
    <p id="textoIntro"></p>
    <button id="btnEntrar" onclick="entrar()">Lista amor?? 💖</button>
  </div>

</div>

<!-- 🔽 CONTENIDO ORIGINAL -->
<div id="contenido" style="display:none;">

<section class="hero">
<h1>❤️ Te amo Franchesca ❤️</h1>
</section>

<!-- TODO TU CONTENIDO SIGUE IGUAL... -->
</div>

<script>

// 💖 GENERAR CORAZONES Y ÑOQUIS
let fondo = document.getElementById("fondoIntro");

setInterval(()=>{
  let el = document.createElement("span");
  el.innerText = Math.random() > 0.5 ? "❤️" : "🥟";
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (20 + Math.random()*30) + "px";
  fondo.appendChild(el);

  setTimeout(()=>el.remove(),10000);
},300);

// ✍️ TEXTO AUTOMATICO (EDITÁ ACÁ)
let texto = "ACÁ ESCRIBÍ EL CONTEXTO QUE LE QUERÉS DAR 💖";
let i = 0;

let escribir = setInterval(()=>{
  document.getElementById("textoIntro").innerHTML += texto[i];
  i++;

  if(i >= texto.length){
    clearInterval(escribir);
    document.getElementById("btnEntrar").style.display = "inline-block";
  }
},40);

// 👉 ENTRAR A LA WEB
function entrar(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("contenido").style.display = "block";
}

</script>

</body>
</html>
